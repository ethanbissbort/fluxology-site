# Apache HTTP Server Configuration for Fluxology Website
# Optimized for serving static Astro site

ServerRoot "/usr/local/apache2"
Listen 80

# Load necessary modules
LoadModule mpm_event_module modules/mod_mpm_event.so
LoadModule authn_core_module modules/mod_authn_core.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule dir_module modules/mod_dir.so
LoadModule mime_module modules/mod_mime.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule env_module modules/mod_env.so
LoadModule headers_module modules/mod_headers.so
LoadModule setenvif_module modules/mod_setenvif.so
LoadModule unixd_module modules/mod_unixd.so
LoadModule alias_module modules/mod_alias.so
LoadModule rewrite_module modules/mod_rewrite.so
LoadModule deflate_module modules/mod_deflate.so
LoadModule filter_module modules/mod_filter.so
LoadModule expires_module modules/mod_expires.so

# Brotli compression. Guarded with <IfFile> so that if the base image ever
# ships without mod_brotli.so, Apache still starts (falling back to gzip).
# The official httpd:2.4-alpine image includes this module.
<IfFile "modules/mod_brotli.so">
  LoadModule brotli_module modules/mod_brotli.so
</IfFile>

# Server Configuration
ServerAdmin admin@fluxology.ca
ServerName localhost

<IfModule unixd_module>
  User www-data
  Group www-data
</IfModule>

# Security: Disable directory listings and .htaccess
<Directory />
  AllowOverride None
  Require all denied
</Directory>

# Document Root
DocumentRoot "/usr/local/apache2/htdocs"

<Directory "/usr/local/apache2/htdocs">
  Options -Indexes +FollowSymLinks
  AllowOverride None
  Require all granted

  # Enable URL rewriting for SPA behavior
  RewriteEngine On
  RewriteBase /

  # Don't rewrite files or directories that exist
  RewriteCond %{REQUEST_FILENAME} !-f
  RewriteCond %{REQUEST_FILENAME} !-d

  # Rewrite everything else to index.html (for client-side routing)
  RewriteRule . /index.html [L]
</Directory>

# Default index files
<IfModule dir_module>
  DirectoryIndex index.html
</IfModule>

# Prevent access to .htaccess and other hidden files
<Files ".ht*">
  Require all denied
</Files>

<Files ".*">
  Require all denied
</Files>

<Files "index.html">
  Require all granted
</Files>

# Error and Access Logs
ErrorLog /proc/self/fd/2
LogLevel warn

<IfModule log_config_module>
  LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" combined
  LogFormat "%h %l %u %t \"%r\" %>s %b" common
  CustomLog /proc/self/fd/1 combined
</IfModule>

# MIME Types
<IfModule mime_module>
  TypesConfig conf/mime.types
  AddType application/javascript .js
  AddType text/css .css
  AddType text/html .html .htm
  AddType image/svg+xml .svg .svgz
  AddType image/webp .webp
  AddType image/avif .avif
  AddType font/woff2 .woff2
  AddType font/woff .woff
  AddType font/ttf .ttf
  AddType font/eot .eot
  AddType application/json .json
  AddEncoding gzip .gz
</IfModule>

# ==============================================
# PERFORMANCE OPTIMIZATIONS
# ==============================================

# Enable HTTP/2 if available
# Protocols h2 h2c http/1.1

# Enable Keep-Alive
KeepAlive On
MaxKeepAliveRequests 100
KeepAliveTimeout 5

# Compression
<IfModule mod_deflate.c>
  # Compress HTML, CSS, JavaScript, Text, XML and fonts
  AddOutputFilterByType DEFLATE application/javascript
  AddOutputFilterByType DEFLATE application/rss+xml
  AddOutputFilterByType DEFLATE application/vnd.ms-fontobject
  AddOutputFilterByType DEFLATE application/x-font
  AddOutputFilterByType DEFLATE application/x-font-opentype
  AddOutputFilterByType DEFLATE application/x-font-otf
  AddOutputFilterByType DEFLATE application/x-font-truetype
  AddOutputFilterByType DEFLATE application/x-font-ttf
  AddOutputFilterByType DEFLATE application/x-javascript
  AddOutputFilterByType DEFLATE application/xhtml+xml
  AddOutputFilterByType DEFLATE application/xml
  AddOutputFilterByType DEFLATE font/opentype
  AddOutputFilterByType DEFLATE font/otf
  AddOutputFilterByType DEFLATE font/ttf
  AddOutputFilterByType DEFLATE image/svg+xml
  AddOutputFilterByType DEFLATE image/x-icon
  AddOutputFilterByType DEFLATE text/css
  AddOutputFilterByType DEFLATE text/html
  AddOutputFilterByType DEFLATE text/javascript
  AddOutputFilterByType DEFLATE text/plain
  AddOutputFilterByType DEFLATE text/xml

  # Don't compress images, videos, or already compressed files
  SetEnvIfNoCase Request_URI \.(?:gif|jpe?g|png|webp|avif|mp4|webm|woff2?)$ no-gzip

  # Compression level (1-9, 6 is good balance)
  DeflateCompressionLevel 6
</IfModule>

# Brotli compression — preferred over gzip when the client advertises it.
# Both filters coexist: Apache negotiates by the request's Accept-Encoding,
# serving "br" to capable clients and falling back to mod_deflate's gzip.
# Only text-based types are compressed; woff2 fonts and raster images are
# already compressed and are intentionally omitted.
<IfModule mod_brotli.c>
  AddOutputFilterByType BROTLI_COMPRESS application/javascript
  AddOutputFilterByType BROTLI_COMPRESS application/json
  AddOutputFilterByType BROTLI_COMPRESS application/rss+xml
  AddOutputFilterByType BROTLI_COMPRESS application/xhtml+xml
  AddOutputFilterByType BROTLI_COMPRESS application/xml
  AddOutputFilterByType BROTLI_COMPRESS image/svg+xml
  AddOutputFilterByType BROTLI_COMPRESS image/x-icon
  AddOutputFilterByType BROTLI_COMPRESS text/css
  AddOutputFilterByType BROTLI_COMPRESS text/html
  AddOutputFilterByType BROTLI_COMPRESS text/javascript
  AddOutputFilterByType BROTLI_COMPRESS text/plain
  AddOutputFilterByType BROTLI_COMPRESS text/xml

  # On-the-fly quality (0-11). 5 balances ratio vs CPU for dynamic responses.
  BrotliCompressionQuality 5
</IfModule>

# ==============================================
# CACHING & EXPIRES HEADERS
# ==============================================

<IfModule mod_expires.c>
  ExpiresActive On
  ExpiresDefault "access plus 1 month"

  # HTML - short cache (may change frequently)
  ExpiresByType text/html "access plus 0 seconds"

  # CSS and JavaScript - 1 year (use versioning/hashing)
  ExpiresByType text/css "access plus 1 year"
  ExpiresByType application/javascript "access plus 1 year"
  ExpiresByType text/javascript "access plus 1 year"

  # Images - 1 year
  ExpiresByType image/jpeg "access plus 1 year"
  ExpiresByType image/jpg "access plus 1 year"
  ExpiresByType image/png "access plus 1 year"
  ExpiresByType image/gif "access plus 1 year"
  ExpiresByType image/webp "access plus 1 year"
  ExpiresByType image/avif "access plus 1 year"
  ExpiresByType image/svg+xml "access plus 1 year"
  ExpiresByType image/x-icon "access plus 1 year"

  # Fonts - 1 year
  ExpiresByType font/woff2 "access plus 1 year"
  ExpiresByType font/woff "access plus 1 year"
  ExpiresByType font/ttf "access plus 1 year"
  ExpiresByType font/eot "access plus 1 year"
  ExpiresByType font/opentype "access plus 1 year"

  # Service Worker - no cache (always fresh)
  <FilesMatch "service-worker\.js$">
    ExpiresActive Off
    Header set Cache-Control "no-cache, no-store, must-revalidate"
  </FilesMatch>
</IfModule>

# Cache-Control headers
<IfModule mod_headers.c>
  # HTML - no cache
  <FilesMatch "\.(html|htm)$">
    Header set Cache-Control "no-cache, no-store, must-revalidate"
    Header set Pragma "no-cache"
    Header set Expires "0"
  </FilesMatch>

  # CSS, JS - immutable (assuming hashed filenames)
  <FilesMatch "\.(css|js)$">
    Header set Cache-Control "public, max-age=31536000, immutable"
  </FilesMatch>

  # Images
  <FilesMatch "\.(jpg|jpeg|png|gif|webp|avif|svg|ico)$">
    Header set Cache-Control "public, max-age=31536000, immutable"
  </FilesMatch>

  # Fonts
  <FilesMatch "\.(woff2|woff|ttf|eot|otf)$">
    Header set Cache-Control "public, max-age=31536000, immutable"
    Header set Access-Control-Allow-Origin "*"
  </FilesMatch>

  # Service Worker - no cache
  <FilesMatch "service-worker\.js$">
    Header set Cache-Control "no-cache, no-store, must-revalidate"
    Header set Service-Worker-Allowed "/"
  </FilesMatch>
</IfModule>

# ==============================================
# SECURITY HEADERS
# ==============================================

<IfModule mod_headers.c>
  # X-Frame-Options: Prevent clickjacking
  Header always set X-Frame-Options "SAMEORIGIN"

  # X-Content-Type-Options: Prevent MIME sniffing
  Header always set X-Content-Type-Options "nosniff"

  # X-XSS-Protection: disabled ("0") per current guidance. The legacy XSS
  # auditor in older browsers could be abused to introduce vulnerabilities;
  # the Content-Security-Policy below is the real XSS defense.
  Header always set X-XSS-Protection "0"

  # Referrer-Policy: Control referrer information
  Header always set Referrer-Policy "strict-origin-when-cross-origin"

  # Permissions-Policy: Control browser features
  Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"

  # Content-Security-Policy: Prevent XSS, injection attacks.
  # base-uri blocks <base> tag injection; form-action restricts where forms
  # (including the Netlify contact form) may submit; object-src 'none' blocks
  # plugin/embed vectors.
  Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'"

  # X-Powered-By is stripped if any module sets it. Note: the core Server
  # header cannot be removed by mod_headers (it is added after this runs);
  # ServerTokens/ServerSignature below are the effective controls.
  Header always unset X-Powered-By
</IfModule>

# Limit version disclosure. Set at global scope so it applies even if
# mod_headers is not loaded (Server: Apache, no version; no signature footer).
ServerTokens Prod
ServerSignature Off

# HSTS: Force HTTPS (uncomment when SSL is configured)
# <IfModule mod_headers.c>
#   Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
# </IfModule>

# ==============================================
# ERROR PAGES
# ==============================================

# Custom error pages (create these if needed)
# ErrorDocument 404 /404.html
# ErrorDocument 500 /500.html

# Note: mod_status / server-status monitoring is intentionally not enabled.
# This is a static site with no monitoring consumer, so the module is not
# loaded and no /server-status handler is exposed (reduced attack surface).

# Include virtual host configuration
Include conf/extra/vhost.conf
